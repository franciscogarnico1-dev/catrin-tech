<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Solicitud Recibida | Catrín Tech</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="img/logo.png" />
    <meta http-equiv="refresh" content="10;url=/" />

    <style>
      body {
        background-color: #0f0f0f;
        color: #ffffff;
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        text-align: center;
        margin: 0;
      }

      .box {
        max-width: 700px;
        margin: 60px auto;
        padding: 30px;
        border: 1px solid #d4af3757;
        border-radius: 8px;
        box-shadow: 0px 0px 50px #c49c2215;
      }

      h1 {
        color: #d4af37;
        margin-bottom: 20px;
      }

      p {
        color: #cccccc;
        margin-bottom: 30px;
      }

      a {
        background-color: #d4af37;
        color: #000;
        padding: 14px 24px;
        text-decoration: none;
        border-radius: 100px;
        font-weight: bold;
      }

      a:hover {
        background-color: #b9962f;
      }

      .timer {
        margin-top: 20px;
        font-size: 14px;
        color: #888;
      }
    </style>
  </head>

  <body>
    <div class="box">
      <h1>Solicitud Recibida</h1>
      <p>Tu información ha sido enviada correctamente. Revisaremos tu caso y te contactaremos en breve.</p>

      <a href="/">Volver al Inicio</a>

      <div class="timer">Serás redirigido automáticamente en 10 segundos.</div>
    </div>
  </body>
</html>
