<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Catrin Tech/Diagnostico</title>
    <title>Diagnóstico Estratégico | Catrín Tech</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="icon" type="image/png" href="img/logo.png" />
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #0f0f0f;
        color: #ffffff;
        margin: 0;
        padding: 0;
      }

      .container {
        max-width: 700px;
        margin: 60px auto;
        padding: 30px;
        border: 1px solid #d4af3757;
        border-radius: 8px;
        box-shadow: 0px 0px 50px #c49c2215;
      }

      h1 {
        text-align: center;
        color: #d4af37;
      }

      p {
        text-align: center;
        margin-bottom: 40px;
        color: #cccccc;
      }

      form {
        display: flex;
        flex-direction: column;
      }

      option {
        color: #000;
        background-color: rgba(73, 65, 0, 0.692);
      }

      input,
      select,
      textarea {
        margin-bottom: 15px;
        padding: 12px;
        border-radius: 6px;
        max-width: 97%;
        min-width: 97%;
        min-height: 20px;
        border: none;
        font-size: 16px;
        background-color: rgba(73, 65, 27, 0.692);
        color: white;
      }

      button {
        padding: 14px;
        font-size: 1rem;
        background-color: #e0b62b;
        color: #000;
        font-weight: bold;
        border-radius: 6px;
        cursor: pointer;
        box-shadow: 0px 15px 80px rgba(202, 155, 16, 0.308);
        border-radius: 100px;
      }

      button:hover {
        background-color: #c49b22;
        transform: translateY(-5px);
        transition:
          transform 100s ease,
          transform 0.5s ease;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>Solicita tu Diagnóstico Estratégico</h1>
      <p>Completa la información para evaluar si tu negocio es apto para implementar un Sistema de Crecimiento Digital con Catrín Tech.</p>

      <form action="https://formsubmit.co/catrintech@gmail.com" method="POST">
        <input type="hidden" name="_next" value="https://catrintech.com/gracias/" />

        <input type="text" name="Nombre" placeholder="Nombre completo" required />

        <input type="tel" name="Celular" maxlength="10" placeholder="Numero de celular" required />

        <input type="text" name="Empresa" placeholder="Empresa / Proyecto" required />

        <input type="text" name="Ciudad" placeholder="Ciudad" required />

        <textarea name="Actividad" maxlength="800" placeholder="¿A qué se dedica tu negocio?" required></textarea>

        <select name="Objetivo" required>
          <option value="">¿Cuál es tu principal objetivo?</option>
          <option>Más clientes</option>
          <option>Más ventas</option>
          <option>Posicionamiento</option>
          <option>Lanzamiento</option>
        </select>

        <select name="Facturación" required>
          <option value="">¿Cuánto facturas mensualmente?</option>
          <option>Menos de 20k</option>
          <option>20k–50k</option>
          <option>50k–100k</option>
          <option>100k+</option>
        </select>

        <select name="Inversión" required>
          <option value="">¿Cuánto estás dispuesto a invertir mensualmente?</option>
          <option>5k–10k</option>
          <option>10k–20k</option>
          <option>20k+</option>
        </select>

        <textarea name="Situación" required placeholder="Describe brevemente tu situación actual"></textarea>

        <button type="submit">Solicitar Evaluación</button>
      </form>
    </div>
  </body>
</html>
